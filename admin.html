<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<title>990짐 관리자</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }
  :root {
    --navy: #1a2744;
    --blue: #285FC7;
    --gray: #f5f6fa;
    --text: #222;
    --text-light: #666;
    --border: #e0e4ef;
    --green: #22c55e;
    --red: #ef4444;
    --orange: #f59e0b;
  }
  body { font-family: 'Noto Sans KR', sans-serif; background: var(--gray); color: var(--text); min-height: 100vh; }
  #login-screen { min-height: 100vh; display: flex; align-items: center; justify-content: center; background: var(--navy); }
  .login-box { background: white; border-radius: 16px; padding: 48px 40px; width: 360px; box-shadow: 0 20px 60px rgba(0,0,0,0.3); }
  .login-logo { font-size: 24px; font-weight: 700; color: var(--navy); margin-bottom: 8px; }
  .login-sub { font-size: 13px; color: var(--text-light); margin-bottom: 32px; }
  .login-box input { width: 100%; padding: 12px 16px; border: 1.5px solid var(--border); border-radius: 8px; font-size: 15px; font-family: inherit; outline: none; transition: border-color 0.2s; }
  .login-box input:focus { border-color: var(--blue); }
  .login-btn { width: 100%; padding: 13px; background: var(--navy); color: white; border: none; border-radius: 8px; font-size: 15px; font-weight: 600; cursor: pointer; margin-top: 16px; font-family: inherit; transition: background 0.2s; }
  .login-btn:hover { background: var(--blue); }
  .login-error { color: var(--red); font-size: 13px; margin-top: 8px; display: none; }
  #admin-screen { display: none; }
  .header { background: var(--navy); padding: 16px 32px; display: flex; align-items: center; justify-content: space-between; }
  .header-logo { color: white; font-size: 18px; font-weight: 700; }
  .header-right { display: flex; align-items: center; gap: 16px; }
  .session-timer { color: rgba(255,255,255,0.6); font-size: 13px; }
  .logout-btn { background: rgba(255,255,255,0.1); color: white; border: none; padding: 8px 16px; border-radius: 6px; cursor: pointer; font-size: 13px; font-family: inherit; }
  .logout-btn:hover { background: rgba(255,255,255,0.2); }
  .main { padding: 32px; max-width: 1200px; margin: 0 auto; }
  .stats { display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; margin-bottom: 32px; }
  .stat-card { background: white; border-radius: 12px; padding: 24px; border: 1px solid var(--border); }
  .stat-label { font-size: 13px; color: var(--text-light); margin-bottom: 8px; }
  .stat-value { font-size: 28px; font-weight: 700; color: var(--navy); }
  .stat-sub { font-size: 12px; color: var(--text-light); margin-top: 4px; }
  .table-wrap { background: white; border-radius: 12px; border: 1px solid var(--border); overflow: hidden; }
  .table-header { padding: 20px 24px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; }
  .table-title { font-size: 16px; font-weight: 600; }
  .refresh-btn { background: var(--gray); border: 1px solid var(--border); padding: 8px 16px; border-radius: 6px; cursor: pointer; font-size: 13px; font-family: inherit; color: var(--text); }
  .refresh-btn:hover { background: var(--border); }
  table { width: 100%; border-collapse: collapse; }
  th { background: var(--gray); padding: 12px 16px; text-align: left; font-size: 12px; font-weight: 600; color: var(--text-light); text-transform: uppercase; letter-spacing: 0.05em; }
  td { padding: 14px 16px; border-bottom: 1px solid var(--border); font-size: 14px; }
  tr:last-child td { border-bottom: none; }
  tr:hover td { background: #fafbff; }
  .badge { display: inline-block; padding: 3px 10px; border-radius: 20px; font-size: 12px; font-weight: 600; }
  .badge-active { background: #dcfce7; color: #16a34a; }
  .badge-cancelled { background: #fee2e2; color: #dc2626; }
  .action-btn { padding: 6px 12px; border-radius: 6px; border: none; cursor: pointer; font-size: 12px; font-weight: 600; font-family: inherit; transition: opacity 0.2s; margin-right: 4px; }
  .action-btn:hover { opacity: 0.8; }
  .btn-cancel { background: #fee2e2; color: #dc2626; }
  .btn-activate { background: #dcfce7; color: #16a34a; }
  .btn-plan { background: #fef3c7; color: #d97706; }
  .loading { text-align: center; padding: 48px; color: var(--text-light); }
  .empty { text-align: center; padding: 48px; color: var(--text-light); }
  .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 100; align-items: center; justify-content: center; }
  .modal-overlay.active { display: flex; }
  .modal { background: white; border-radius: 16px; padding: 32px; width: 400px; box-shadow: 0 20px 60px rgba(0,0,0,0.2); }
  .modal-title { font-size: 18px; font-weight: 700; margin-bottom: 8px; }
  .modal-desc { font-size: 14px; color: var(--text-light); margin-bottom: 24px; }
  .modal-btns { display: flex; gap: 8px; justify-content: flex-end; }
  .modal-btn { padding: 10px 20px; border-radius: 8px; border: none; cursor: pointer; font-size: 14px; font-weight: 600; font-family: inherit; }
  .modal-btn-cancel { background: var(--gray); color: var(--text); }
  .modal-btn-confirm { background: var(--red); color: white; }
  .modal-btn-confirm.green { background: var(--green); }
  .modal-btn-confirm.orange { background: var(--orange); color: white; }
  .plan-select { width: 100%; padding: 12px 16px; border: 1.5px solid var(--border); border-radius: 8px; font-size: 15px; font-family: inherit; outline: none; margin-top: 8px; }
  .plan-select:focus { border-color: var(--blue); }
  @media (max-width: 768px) { .stats { grid-template-columns: repeat(2, 1fr); } .main { padding: 16px; } table { font-size: 13px; } th, td { padding: 10px 12px; } }
</style>
</head>
<body>

<div id="login-screen">
  <div class="login-box">
    <div class="login-logo">990짐 관리자</div>
    <div class="login-sub">구독 회원 관리 시스템</div>
    <input type="password" id="pw-input" placeholder="비밀번호 입력" onkeydown="if(event.key==='Enter')doLogin()">
    <button class="login-btn" onclick="doLogin()">로그인</button>
    <div class="login-error" id="login-error">비밀번호가 올바르지 않습니다.</div>
  </div>
</div>

<div id="admin-screen">
  <div class="header">
    <div class="header-logo">990짐 관리자</div>
    <div class="header-right">
      <span class="session-timer" id="session-timer"></span>
      <button class="logout-btn" onclick="doLogout()">로그아웃</button>
    </div>
  </div>
  <div class="main">
    <div class="stats">
      <div class="stat-card">
        <div class="stat-label">전체 구독자</div>
        <div class="stat-value" id="stat-total">-</div>
        <div class="stat-sub">누적</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">활성 구독자</div>
        <div class="stat-value" id="stat-active" style="color:var(--green)">-</div>
        <div class="stat-sub">현재</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">이번달 예상 매출</div>
        <div class="stat-value" id="stat-revenue">-</div>
        <div class="stat-sub">원</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">해지 회원</div>
        <div class="stat-value" id="stat-cancelled" style="color:var(--red)">-</div>
        <div class="stat-sub">누적</div>
      </div>
    </div>
    <div class="table-wrap">
      <div class="table-header">
        <div class="table-title">구독 회원 목록</div>
        <button class="refresh-btn" onclick="loadSubscribers()">🔄 새로고침</button>
      </div>
      <div id="table-body">
        <div class="loading">불러오는 중...</div>
      </div>
    </div>
  </div>
</div>

<!-- 해지/복구 모달 -->
<div class="modal-overlay" id="confirm-modal">
  <div class="modal">
    <div class="modal-title" id="modal-title"></div>
    <div class="modal-desc" id="modal-desc"></div>
    <div class="modal-btns">
      <button class="modal-btn modal-btn-cancel" onclick="closeModal()">취소</button>
      <button class="modal-btn modal-btn-confirm" id="modal-confirm-btn" onclick="confirmAction()">확인</button>
    </div>
  </div>
</div>

<!-- 플랜 변경 모달 -->
<div class="modal-overlay" id="plan-modal">
  <div class="modal">
    <div class="modal-title">플랜 변경</div>
    <div class="modal-desc" id="plan-modal-desc"></div>
    <select class="plan-select" id="plan-select">
      <option value="베이직">베이직 (39,000원/월)</option>
      <option value="스탠다드">스탠다드 (69,000원/월)</option>
      <option value="프리미엄">프리미엄 (99,000원/월)</option>
    </select>
    <div style="font-size:12px;color:var(--text-light);margin-top:8px;">다음 결제일부터 변경된 플랜 금액으로 청구됩니다.</div>
    <div class="modal-btns" style="margin-top:24px;">
      <button class="modal-btn modal-btn-cancel" onclick="closePlanModal()">취소</button>
      <button class="modal-btn modal-btn-confirm orange" id="plan-confirm-btn" onclick="confirmPlanChange()">변경</button>
    </div>
  </div>
</div>

<script>
const SUPABASE_URL = 'https://twwpxtveupsqwenkprdw.supabase.co';
const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InR3d3B4dHZldXBzcXdlbmtwcmR3Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM2NTcyNjYsImV4cCI6MjA4OTIzMzI2Nn0.uoDrUFNiLhDVTHDeGOWPBeQCeI5kzTOP678r9rLbioM';
const VERCEL_URL = 'https://project-ps3ps.vercel.app';
const ADMIN_PW = '990gym2026!';
const PLAN_PRICES = { '베이직': 39000, '스탠다드': 69000, '프리미엄': 99000 };
const SESSION_TIMEOUT = 30 * 60 * 1000;

let currentAction = null;
let currentPlanAction = null;
let subscribers = [];
let sessionInterval = null;
let sessionExpiry = null;

function doLogin() {
  const pw = document.getElementById('pw-input').value;
  if (pw === ADMIN_PW) {
    sessionStorage.setItem('admin_logged_in', '1');
    sessionExpiry = Date.now() + SESSION_TIMEOUT;
    sessionStorage.setItem('admin_expiry', sessionExpiry);
    showAdmin();
  } else {
    document.getElementById('login-error').style.display = 'block';
  }
}

function showAdmin() {
  document.getElementById('login-screen').style.display = 'none';
  document.getElementById('admin-screen').style.display = 'block';
  loadSubscribers();
  startSessionTimer();
  document.addEventListener('mousemove', resetSessionTimer);
  document.addEventListener('keydown', resetSessionTimer);
  document.addEventListener('click', resetSessionTimer);
}

function startSessionTimer() {
  if (sessionInterval) clearInterval(sessionInterval);
  sessionInterval = setInterval(function() {
    const remaining = sessionExpiry - Date.now();
    if (remaining <= 0) { doLogout(true); return; }
    const mins = Math.floor(remaining / 60000);
    const secs = Math.floor((remaining % 60000) / 1000);
    document.getElementById('session-timer').textContent = `${mins}:${secs.toString().padStart(2,'0')} 후 자동 로그아웃`;
  }, 1000);
}

function resetSessionTimer() {
  sessionExpiry = Date.now() + SESSION_TIMEOUT;
  sessionStorage.setItem('admin_expiry', sessionExpiry);
}

function doLogout(auto) {
  sessionStorage.removeItem('admin_logged_in');
  sessionStorage.removeItem('admin_expiry');
  if (sessionInterval) clearInterval(sessionInterval);
  document.removeEventListener('mousemove', resetSessionTimer);
  document.removeEventListener('keydown', resetSessionTimer);
  document.removeEventListener('click', resetSessionTimer);
  document.getElementById('login-screen').style.display = 'flex';
  document.getElementById('admin-screen').style.display = 'none';
  document.getElementById('pw-input').value = '';
  if (auto) alert('30분 동안 활동이 없어 자동 로그아웃되었습니다.');
}

window.addEventListener('load', function() {
  const loggedIn = sessionStorage.getItem('admin_logged_in');
  const expiry = parseInt(sessionStorage.getItem('admin_expiry'));
  if (loggedIn && expiry && Date.now() < expiry) {
    sessionExpiry = expiry;
    showAdmin();
  }
});

async function loadSubscribers() {
  document.getElementById('table-body').innerHTML = '<div class="loading">불러오는 중...</div>';
  try {
    const res = await fetch(`${SUPABASE_URL}/rest/v1/subscribers?select=*&order=created_at.desc`, {
      headers: { 'apikey': SUPABASE_ANON_KEY, 'Authorization': `Bearer ${SUPABASE_ANON_KEY}` }
    });
    subscribers = await res.json();
    renderTable();
    renderStats();
  } catch(e) {
    document.getElementById('table-body').innerHTML = '<div class="empty">데이터를 불러오지 못했습니다.</div>';
  }
}

function renderStats() {
  const total = subscribers.length;
  const active = subscribers.filter(s => s.status === 'active').length;
  const cancelled = subscribers.filter(s => s.status === 'cancelled').length;
  const revenue = subscribers.filter(s => s.status === 'active').reduce((sum, s) => sum + (PLAN_PRICES[s.plan] || 0), 0);
  document.getElementById('stat-total').textContent = total;
  document.getElementById('stat-active').textContent = active;
  document.getElementById('stat-cancelled').textContent = cancelled;
  document.getElementById('stat-revenue').textContent = revenue.toLocaleString();
}

function renderTable() {
  if (!subscribers.length) {
    document.getElementById('table-body').innerHTML = '<div class="empty">등록된 구독자가 없습니다.</div>';
    return;
  }
  let html = `<table><thead><tr><th>이름</th><th>연락처</th><th>이메일</th><th>플랜</th><th>상태</th><th>가입일</th><th>다음결제일</th><th>관리</th></tr></thead><tbody>`;
  subscribers.forEach(s => {
    const date = new Date(s.created_at).toLocaleDateString('ko-KR');
    const nextBilling = s.next_billing_date ? new Date(s.next_billing_date).toLocaleDateString('ko-KR') : '-';
    const statusBadge = s.status === 'active'
      ? '<span class="badge badge-active">활성</span>'
      : '<span class="badge badge-cancelled">해지</span>';
    const actionBtns = s.status === 'active'
      ? `<button class="action-btn btn-plan" onclick="openPlanModal('${s.id}', '${s.name}', '${s.plan}')">플랜변경</button>
         <button class="action-btn btn-cancel" onclick="openCancelModal('${s.id}', '${s.name}')">해지</button>`
      : `<button class="action-btn btn-activate" onclick="openActivateModal('${s.id}', '${s.name}')">복구</button>`;
    html += `<tr><td><strong>${s.name}</strong></td><td>${s.phone||'-'}</td><td>${s.email||'-'}</td><td>${s.plan}</td><td>${statusBadge}</td><td>${date}</td><td>${nextBilling}</td><td>${actionBtns}</td></tr>`;
  });
  html += '</tbody></table>';
  document.getElementById('table-body').innerHTML = html;
}

function openCancelModal(id, name) {
  document.getElementById('modal-title').textContent = '구독 해지';
  document.getElementById('modal-desc').textContent = `${name}님의 구독을 해지하시겠습니까? 다음 달부터 자동결제가 중단됩니다.`;
  document.getElementById('modal-confirm-btn').className = 'modal-btn modal-btn-confirm';
  document.getElementById('modal-confirm-btn').textContent = '해지';
  currentAction = { type: 'cancel', id };
  document.getElementById('confirm-modal').classList.add('active');
}

function openActivateModal(id, name) {
  document.getElementById('modal-title').textContent = '구독 복구';
  document.getElementById('modal-desc').textContent = `${name}님의 구독을 다시 활성화하시겠습니까? 즉시 결제가 진행됩니다.`;
  document.getElementById('modal-confirm-btn').className = 'modal-btn modal-btn-confirm green';
  document.getElementById('modal-confirm-btn').textContent = '복구';
  currentAction = { type: 'activate', id };
  document.getElementById('confirm-modal').classList.add('active');
}

function closeModal() {
  document.getElementById('confirm-modal').classList.remove('active');
  currentAction = null;
}

async function confirmAction() {
  if (!currentAction) return;
  const { type, id } = currentAction;
  const newStatus = type === 'cancel' ? 'cancelled' : 'active';
  const btn = document.getElementById('modal-confirm-btn');
  btn.disabled = true;
  btn.textContent = '처리중...';
  try {
    const res = await fetch(`${VERCEL_URL}/api/cancel-subscriber`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ id, status: newStatus })
    });
    const data = await res.json();
    if (data.success) {
      closeModal();
      loadSubscribers();
    } else {
      alert('오류: ' + (data.error || '다시 시도해주세요'));
      btn.disabled = false;
      btn.textContent = '확인';
    }
  } catch(e) {
    alert('오류가 발생했습니다. 다시 시도해주세요.');
    btn.disabled = false;
    btn.textContent = '확인';
  }
}

// 플랜 변경
function openPlanModal(id, name, currentPlan) {
  document.getElementById('plan-modal-desc').textContent = `${name}님의 플랜을 변경합니다. (현재: ${currentPlan})`;
  document.getElementById('plan-select').value = currentPlan;
  currentPlanAction = { id, name, currentPlan };
  document.getElementById('plan-modal').classList.add('active');
}

function closePlanModal() {
  document.getElementById('plan-modal').classList.remove('active');
  currentPlanAction = null;
}

async function confirmPlanChange() {
  const action = currentPlanAction;
  if (!action) return;
  const newPlan = document.getElementById('plan-select').value;
  if (newPlan === action.currentPlan) {
    alert('현재 플랜과 동일합니다.');
    return;
  }
  const btn = document.getElementById('plan-confirm-btn');
  btn.disabled = true;
  btn.textContent = '처리중...';
  try {
    const res = await fetch(`${SUPABASE_URL}/rest/v1/subscribers?id=eq.${action.id}`, {
      method: 'PATCH',
      headers: {
        'apikey': SUPABASE_ANON_KEY,
        'Authorization': `Bearer ${SUPABASE_ANON_KEY}`,
        'Content-Type': 'application/json',
        'Prefer': 'return=minimal',
      },
      body: JSON.stringify({ plan: newPlan }),
    });
    const actionName = action.name;
    closePlanModal();
    if (res.ok || res.status === 204) {
      loadSubscribers();
      alert(`${actionName}님 플랜이 ${newPlan}으로 변경되었습니다. 다음 결제일부터 적용됩니다.`);
    } else {
      alert('플랜 변경에 실패했습니다.');
      btn.disabled = false;
      btn.textContent = '변경';
    }
  } catch(e) {
    alert('오류: ' + e.message);
    btn.disabled = false;
    btn.textContent = '변경';
  }
}
</script>
</body>
</html>
